<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="blueGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D7AC7"/>
      <stop offset="50%" stop-color="#1A9B5C"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
  </defs>

  <!-- 白色背景 -->
  <rect width="120" height="120" fill="#FFFFFF"/>

  <!-- 外层圆环 - 蓝绿渐变弧形 -->
  <path d="M88,10 A78,78 0 1,1 14,69 A73,73 0 0,0 86,12" fill="none" stroke="url(#blueGreen)" stroke-width="10" stroke-linecap="round"/>

  <!-- 内部主体 - 深蓝椭圆 -->
  <ellipse cx="66" cy="75" rx="52" ry="58" fill="url(#blueGrad)"/>

  <!-- 白色Z形笔画 -->
  <path d="M34,54 L90,54 L34,99 L88,99" fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AI智能发光点 -->
  <circle cx="62" cy="77" r="8" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="62" cy="77" r="4" fill="#4CAF50"/>
</svg>
