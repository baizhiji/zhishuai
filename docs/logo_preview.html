<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>智枢AI LOGO预览</title>
  <style>
    body { background: #f5f5f5; font-family: 'PingFang SC','Microsoft YaHei',sans-serif; padding: 40px; }
    .container { max-width: 900px; margin: 0 auto; }
    .logo-card { background: #fff; border-radius: 12px; padding: 30px; margin: 20px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .logo-card h3 { color: #333; margin-bottom: 15px; font-size: 18px; }
    .logo-card p { color: #888; font-size: 14px; margin-top: 10px; }
    .dark-bg { background: #1a1a2e; border-radius: 12px; padding: 30px; margin-top: 10px; }
    h1 { text-align: center; color: #1565C0; margin-bottom: 30px; }
    .label { font-size: 12px; color: #666; margin-bottom: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>智枢AI LOGO 设计方案预览</h1>

    <!-- 方案1 -->
    <div class="logo-card">
      <h3>方案1 - Z形笔画 + AI发光节点</h3>
      <p class="label">白色背景</p>
      <div>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
          <defs>
            <linearGradient id="blueGreen1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#0D7AC7"/>
              <stop offset="50%" stop-color="#1A9B5C"/>
              <stop offset="100%" stop-color="#4CAF50"/>
            </linearGradient>
            <linearGradient id="blueGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#1565C0"/>
              <stop offset="100%" stop-color="#1976D2"/>
            </linearGradient>
          </defs>
          <rect width="400" height="160" fill="#FFFFFF"/>
          <g transform="translate(30, 10)">
            <path d="M70,8 A62,62 0 1,1 12,55 A58,58 0 0,0 68,10" fill="none" stroke="url(#blueGreen1)" stroke-width="9" stroke-linecap="round"/>
            <ellipse cx="52" cy="65" rx="42" ry="48" fill="url(#blueGrad1)"/>
            <path d="M28,45 L72,45 L28,82 L70,82" fill="none" stroke="#FFFFFF" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="50" cy="63" r="6" fill="#FFFFFF" opacity="0.95"/>
            <circle cx="50" cy="63" r="3" fill="#4CAF50"/>
          </g>
          <text x="130" y="56" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="38" font-weight="700" fill="#1565C0" letter-spacing="4">智枢</text>
          <text x="228" y="56" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="600" fill="#1A9B5C">AI</text>
          <text x="132" y="80" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="400" fill="#888888" letter-spacing="1">智能中枢 · AI驱动的一站式SaaS平台</text>
        </svg>
      </div>
      <p class="label">深色背景</p>
      <div class="dark-bg">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
          <rect width="400" height="160" fill="#1a1a2e"/>
          <g transform="translate(30, 10)">
            <path d="M70,8 A62,62 0 1,1 12,55 A58,58 0 0,0 68,10" fill="none" stroke="#4CAF50" stroke-width="9" stroke-linecap="round"/>
            <ellipse cx="52" cy="65" rx="42" ry="48" fill="#1565C0"/>
            <path d="M28,45 L72,45 L28,82 L70,82" fill="none" stroke="#FFFFFF" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="50" cy="63" r="6" fill="#FFFFFF" opacity="0.95"/>
            <circle cx="50" cy="63" r="3" fill="#4CAF50"/>
          </g>
          <text x="130" y="56" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="38" font-weight="700" fill="#FFFFFF" letter-spacing="4">智枢</text>
          <text x="228" y="56" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="600" fill="#66BB6A">AI</text>
          <text x="132" y="80" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="400" fill="#AAAAAA" letter-spacing="1">智能中枢 · AI驱动的一站式SaaS平台</text>
        </svg>
      </div>
      <p>圆形蓝绿渐变弧环 + 深蓝椭圆主体 + 白色Z形笔画（"智"首字母）+ 交叉处绿色AI发光点。风格继承原logo的"圆形外框+字母图形化"基因。</p>
    </div>

    <!-- 方案2 -->
    <div class="logo-card">
      <h3>方案2 - 枢纽节点 + 四向辐射连接</h3>
      <p class="label">白色背景</p>
      <div>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
          <defs>
            <linearGradient id="blueGreen2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#0D7AC7"/>
              <stop offset="60%" stop-color="#1A9B5C"/>
              <stop offset="100%" stop-color="#66BB6A"/>
            </linearGradient>
            <linearGradient id="deepBlue2" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#1565C0"/>
              <stop offset="100%" stop-color="#0D47A1"/>
            </linearGradient>
          </defs>
          <rect width="400" height="160" fill="#FFFFFF"/>
          <g transform="translate(30, 10)">
            <circle cx="60" cy="60" r="57" fill="none" stroke="url(#blueGreen2)" stroke-width="8" stroke-dasharray="280 78" transform="rotate(-35, 60, 60)" stroke-linecap="round"/>
            <ellipse cx="60" cy="62" rx="40" ry="46" fill="url(#deepBlue2)"/>
            <circle cx="60" cy="62" r="7" fill="#FFFFFF"/>
            <circle cx="60" cy="62" r="4" fill="#4CAF50"/>
            <line x1="60" y1="53" x2="60" y2="26" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
            <line x1="60" y1="71" x2="60" y2="95" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
            <line x1="51" y1="62" x2="30" y2="62" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
            <line x1="69" y1="62" x2="90" y2="62" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
            <circle cx="60" cy="24" r="3.5" fill="#81C784" opacity="0.9"/>
            <circle cx="60" cy="97" r="3.5" fill="#81C784" opacity="0.9"/>
            <circle cx="27" cy="62" r="3.5" fill="#81C784" opacity="0.9"/>
            <circle cx="93" cy="62" r="3.5" fill="#81C784" opacity="0.9"/>
          </g>
          <text x="128" y="54" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="36" font-weight="700" fill="#0D47A1" letter-spacing="4">智枢</text>
          <text x="222" y="54" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#1A9B5C">AI</text>
          <text x="128" y="76" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="400" fill="#999999" letter-spacing="1.5">Smart Hub · 智能运营中台</text>
        </svg>
      </div>
      <p class="label">深色背景</p>
      <div class="dark-bg">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
          <rect width="400" height="160" fill="#1a1a2e"/>
          <g transform="translate(30, 10)">
            <circle cx="60" cy="60" r="57" fill="none" stroke="#66BB6A" stroke-width="8" stroke-dasharray="280 78" transform="rotate(-35, 60, 60)" stroke-linecap="round"/>
            <ellipse cx="60" cy="62" rx="40" ry="46" fill="#0D47A1"/>
            <circle cx="60" cy="62" r="7" fill="#FFFFFF"/>
            <circle cx="60" cy="62" r="4" fill="#66BB6A"/>
            <line x1="60" y1="53" x2="60" y2="26" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
            <line x1="60" y1="71" x2="60" y2="95" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
            <line x1="51" y1="62" x2="30" y2="62" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
            <line x1="69" y1="62" x2="90" y2="62" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
            <circle cx="60" cy="24" r="3.5" fill="#81C784" opacity="0.9"/>
            <circle cx="60" cy="97" r="3.5" fill="#81C784" opacity="0.9"/>
            <circle cx="27" cy="62" r="3.5" fill="#81C784" opacity="0.9"/>
            <circle cx="93" cy="62" r="3.5" fill="#81C784" opacity="0.9"/>
          </g>
          <text x="128" y="54" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" letter-spacing="4">智枢</text>
          <text x="222" y="54" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#66BB6A">AI</text>
          <text x="128" y="76" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="400" fill="#AAAAAA" letter-spacing="1.5">Smart Hub · 智能运营中台</text>
        </svg>
      </div>
      <p>圆形蓝绿渐变轨道弧环 + 深蓝椭圆主体 + 中心枢纽节点 + 四向辐射连接线。突出"枢"（中枢/Hub）的含义——多系统汇聚、统一调度。</p>
    </div>
  </div>
</body>
</html>
