<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D7AC7"/>
      <stop offset="50%" stop-color="#1A9B5C"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- 内部深蓝圆 -->
  <circle cx="16" cy="17" r="11" fill="url(#inner)"/>

  <!-- Z形笔画 -->
  <path d="M8,9 L24,9 L8,24 L22,24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 中心发光点 -->
  <circle cx="16" cy="17" r="2.5" fill="#FFFFFF"/>
  <circle cx="16" cy="17" r="1.2" fill="#4CAF50"/>
</svg>
