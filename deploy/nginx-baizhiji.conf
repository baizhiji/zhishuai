# Nginx 配置 - 智枢 AI SaaS 系统
# 复制到 /etc/nginx/sites-available/baizhiji
# 然后创建软链接: sudo ln -s /etc/nginx/sites-available/baizhiji /etc/nginx/sites-enabled/

server {
    listen 443 ssl http2;
    server_name baizhiji.net www.baizhiji.net;
    
    # SSL 配置
    ssl_certificate /etc/letsencrypt/live/baizhiji.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/baizhiji.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    
    # Next.js 静态文件 - 直接代理到 3000
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }
    
    # 前端页面 - 反向代理到 Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
    
    # API 反向代理到后端
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # WebSocket 支持
    location /_next/webpack-hmr {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
    
    # 日志
    access_log /var/log/nginx/baizhiji-access.log;
    error_log /var/log/nginx/baizhiji-error.log;
}

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name baizhiji.net www.baizhiji.net;
    return 301 https://$server_name$request_uri;
}
