server {
    server_name baizhiji.net www.baizhiji.net;
    
    root /www/zhishuai/web;
    
    # 禁止 nginx 缓存所有内容
    add_header Cache-Control "no-cache, no-store, must-revalidate, proxy-revalidate, max-age=0";
    add_header Pragma "no-cache";
    add_header Expires "0";
    
    # 兼容所有旧的静态文件路径
    location ~ ^/(next|antd)/static/(.*)$ {
        rewrite ^/(next|antd)/static/(.*)$ /_next/static/$2 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }
    
    # 兼容 /static/ 路径
    location ~ ^/static/(.*)$ {
        rewrite ^/static/(.*)$ /_next/static/$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }
    
    # Next.js 静态文件
    location /_next/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires epoch;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # 兼容 chunks 路径
    location ~ ^/chunks/(.*)$ {
        rewrite ^/chunks/(.*)$ /_next/static/chunks/$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }
    
    # 前端页面
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/baizhiji.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/baizhiji.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.baizhiji.net) {
        return 301 https://$host$request_uri;
    }
    if ($host = baizhiji.net) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name baizhiji.net www.baizhiji.net;
    return 404;
}
