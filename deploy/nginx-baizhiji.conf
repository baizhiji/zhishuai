server {
    server_name baizhiji.net www.baizhiji.net;
    
    root /www/zhishuai/web;
    
    # 将 /next/static/ 重写为 /_next/static/
    location ~ ^/next/static/(.*)$ {
        rewrite ^/next/static/(.*)$ /_next/static/$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }
    
    # 新的 Next.js 静态文件路径
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }
    
    # 前端页面
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    
    # API 反向代理
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/baizhiji.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/baizhiji.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.baizhiji.net) {
        return 301 https://$host$request_uri;
    }
    if ($host = baizhiji.net) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name baizhiji.net www.baizhiji.net;
    return 404;
}
