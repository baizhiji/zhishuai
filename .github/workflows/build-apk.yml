name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apk/**'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'apk/pnpm-lock.yaml'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        run: |
          # Download Android command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp
          mkdir -p $HOME/android-sdk/cmdline-tools
          mv /tmp/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          
          # Set environment
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          
      - name: Accept licenses
        run: |
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
      - name: Install Android platforms and build-tools
        run: |
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          
      - name: Install APK dependencies
        run: |
          cd apk
          pnpm install
          
      - name: Generate Android project
        run: |
          cd apk
          npx expo prebuild --platform android --clean
          
      - name: Build Release APK
        env:
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.11/x64
        run: |
          cd apk/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x lint
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zhishuai-apk
          path: apk/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          
      - name: Upload to Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: apk/android/app/build/outputs/apk/release/*.apk
          tag_name: apk-v${{ github.run_number }}
          name: Android APK v${{ github.run_number }}
          body: |
            ## 智枢AI APK
            
            ### 下载说明
            - `app-release.apk` - 可直接安装的APK
            
            ### 版本信息
            - Build: ${{ github.run_number }}
            - 时间: ${{ github.event.head_commit.timestamp }}
            
            ### 更新内容
            ${{ github.event.head_commit.message }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

